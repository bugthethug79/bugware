<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bugware — Products</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── PRODUCT HERO ── */
    .product-hero {
      min-height: 340px;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 100px 0 0;
      overflow: hidden;
    }
    .product-hero-bg {
      position: absolute;
      inset: 0;
      background: var(--hero-gradient, var(--panel));
      opacity: 0.55;
    }
    .product-hero-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }
    .product-hero-vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
      pointer-events: none;
    }
    .product-hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding-bottom: 48px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--faint);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .breadcrumb a {
      color: var(--faint);
      text-decoration: none;
      transition: color 0.15s;
    }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb svg { flex-shrink: 0; }

    .product-hero-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 100px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      margin-bottom: 16px;
    }

    .product-hero-name {
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 800;
      letter-spacing: -3px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 14px;
    }
    .product-hero-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hero-meta-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .hero-meta-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent, var(--muted));
      flex-shrink: 0;
    }
    .hero-meta-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
    }

    /* ── MAIN LAYOUT ── */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      padding: 40px 0 100px;
      align-items: start;
    }

    /* ── GAME SECTIONS ── */
    .game-sections { display: flex; flex-direction: column; gap: 14px; }

    .game-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .game-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .game-section-head:hover { background: rgba(255,255,255,0.02); }
    .game-section-head.open { border-bottom: 1px solid var(--border); }

    .game-section-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.2px;
    }
    .game-section-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .game-section-count {
      font-size: 11px;
      color: var(--faint);
      font-weight: 500;
    }
    .game-chev {
      width: 16px; height: 16px;
      color: var(--faint);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1), color 0.15s;
      flex-shrink: 0;
    }
    .game-section-head.open .game-chev {
      transform: rotate(180deg);
      color: var(--muted);
    }

    .game-variants {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(.4,0,.2,1);
    }
    .game-variants.open { max-height: 600px; }

    .variant-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px 13px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.035);
      cursor: pointer;
      transition: background 0.12s;
      gap: 12px;
    }
    .variant-row:last-child { border-bottom: none; }
    .variant-row:hover { background: rgba(255,255,255,0.025); }
    .variant-row.selected { background: rgba(255,255,255,0.04); }

    .variant-radio {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }
    .variant-row.selected .variant-radio {
      border-color: var(--accent, var(--white));
    }
    .variant-radio-inner {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent, var(--white));
      opacity: 0;
      transition: opacity 0.15s;
    }
    .variant-row.selected .variant-radio-inner { opacity: 1; }

    .variant-info { flex: 1; }
    .variant-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .variant-game-label {
      font-size: 11px;
      color: var(--faint);
      font-weight: 400;
      margin-top: 2px;
    }

    .variant-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.2px;
      flex-shrink: 0;
    }
    .variant-price.contact {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── STICKY PURCHASE CARD ── */
    .purchase-card {
      position: sticky;
      top: 88px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    /* ── PURCHASE CARD BANNER ── */
    .purchase-card-banner {
      height: 88px;
      position: relative;
      overflow: hidden;
    }
    .purchase-card-banner-bg {
      position: absolute;
      inset: 0;
      background: var(--hero-gradient, var(--panel));
      opacity: 0.8;
    }
    /* Dot grid overlay */
    .purchase-card-banner-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 14px 14px;
      pointer-events: none;
      z-index: 1;
    }
    /* Diagonal stripes */
    .purchase-card-banner-stripes {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 14px,
        rgba(255,255,255,0.03) 14px,
        rgba(255,255,255,0.03) 15px
      );
      pointer-events: none;
      z-index: 1;
    }
    /* Accent glow orb */
    .purchase-card-banner-glow {
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--accent, rgba(255,255,255,0.2));
      opacity: 0.22;
      filter: blur(28px);
      bottom: -30px;
      right: 10px;
      pointer-events: none;
      z-index: 1;
    }
    /* Bottom fade */
    .purchase-card-banner::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: linear-gradient(to bottom, transparent, var(--panel));
      pointer-events: none;
      z-index: 2;
    }
    /* Product avatar inside purchase card banner */
    .purchase-card-avatar {
      position: absolute;
      bottom: -16px;
      left: 20px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 11px;
      border: 2px solid rgba(255,255,255,0.1);
      overflow: hidden;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .purchase-card-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .purchase-card-avatar-initial {
      font-size: 20px;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: -1px;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      user-select: none;
    }

    .purchase-card-body { padding: 28px 22px 24px; }

    .purchase-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }
    .purchase-selected {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .purchase-selected em {
      font-style: normal;
      color: var(--accent, var(--text));
      font-weight: 500;
    }

    .purchase-price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 18px;
    }
    .purchase-price {
      font-size: 32px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .purchase-price.empty { font-size: 16px; color: var(--faint); }
    .purchase-price-label {
      font-size: 12px;
      color: var(--faint);
      font-weight: 500;
    }

    .purchase-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: filter 0.15s, transform 0.15s;
      background: var(--accent, var(--white));
      color: var(--btn-text, #000);
    }
    .purchase-btn:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
    }
    .purchase-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
    /* Discord icon inside purchase button */
    .purchase-btn-icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .purchase-note {
      font-size: 11.5px;
      color: var(--faint);
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }

    .purchase-divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    .purchase-features {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .purchase-feature {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .purchase-feature svg {
      flex-shrink: 0;
      color: var(--accent, var(--muted));
    }

    /* ── NOT FOUND ── */
    .not-found {
      text-align: center;
      padding: 160px 0 120px;
    }
    .not-found h2 {
      font-size: 36px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 12px;
    }
    .not-found p { color: var(--muted); margin-bottom: 24px; }

    @media (max-width: 860px) {
      .product-layout { grid-template-columns: 1fr; }
      .purchase-card { position: static; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="assets/logo.png" alt="Bugware" onerror="this.style.display='none'" />
    <span class="nav-logo-name">Bugware</span>
  </a>
  <ul class="nav-links">
    <li><a href="products.html">Products</a></li>
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="index.html#discord" class="nav-cta">Discord</a></li>
  </ul>
</nav>

<div class="wrap" id="app">
  <!-- injected by JS -->
</div>

<script src="products-data.js"></script>
<script>
const app = document.getElementById('app');

const params = new URLSearchParams(window.location.search);
const slug = params.get('p');
const product = slug ? getProductBySlug(slug) : null;

if (!product) {
  app.innerHTML = `
    <div class="container not-found">
      <div class="sec-tag">404</div>
      <h2>Product not found</h2>
      <p>That product doesn't exist or may have been removed.</p>
      <a href="products.html" class="btn btn-solid">← Back to Products</a>
    </div>
    ${renderFooter()}
  `;
} else {
  document.title = `Bugware — ${product.name}`;

  const lightAccents = ['#f77f00','#b48be4','#adb5bd','#4cc9f0','#00b4d8','#52b788'];
  const btnTextColor = lightAccents.includes(product.accentColor) ? '#000' : '#fff';

  const priceRange = getPriceRange(product);

  const allVariants = [];
  product.games.forEach(g => {
    Object.entries(g.prices).forEach(([tier, price]) => {
      allVariants.push({ game: g.name, tier, price });
    });
  });

  const initial = product.name.charAt(0).toUpperCase();

  // Avatar for purchase card banner
  const purchaseAvatarInner = product.image
    ? `<img src="${product.image}" alt="${product.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span class="purchase-card-avatar-initial" style="display:none">${initial}</span>`
    : `<span class="purchase-card-avatar-initial">${initial}</span>`;

  app.innerHTML = `
    <div class="product-hero">
      <div class="product-hero-bg"></div>
      <div class="product-hero-dots"></div>
      <div class="product-hero-vignette"></div>
      <div class="product-hero-content">
        <div class="container">
          <nav class="breadcrumb">
            <a href="products.html">Products</a>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span style="color:var(--text)">${product.name}</span>
          </nav>
          ${product.tag ? `<div class="product-hero-tag">${product.tag}</div>` : ''}
          <div class="product-hero-name">${product.name}</div>
          <div class="product-hero-meta">
            <div class="hero-meta-pill">
              <span class="dot"></span>
              ${product.type}
            </div>
            <div class="hero-meta-pill">
              <span class="dot" style="background:var(--border2)"></span>
              ${product.games.length} ${product.games.length === 1 ? 'game / plan' : 'games / plans'}
            </div>
            <div class="hero-meta-price">${priceRange ? 'From ' + priceRange : 'Contact for pricing'}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="product-layout">

        <!-- LEFT: game accordion sections -->
        <div class="game-sections" id="gameSections">
          ${product.games.map((game, gi) => `
            <div class="game-section">
              <div class="game-section-head ${gi === 0 ? 'open' : ''}" onclick="toggleGame(this)">
                <span class="game-section-name">${game.name}</span>
                <div class="game-section-right">
                  <span class="game-section-count">${Object.keys(game.prices).length} variant${Object.keys(game.prices).length !== 1 ? 's' : ''}</span>
                  <svg class="game-chev" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <div class="game-variants ${gi === 0 ? 'open' : ''}">
                ${Object.entries(game.prices).map(([tier, price]) => {
                  const variantIdx = allVariants.findIndex(v => v.game === game.name && v.tier === tier);
                  const isContact = isNaN(parseFloat(String(price).replace('$','')));
                  return `
                    <div class="variant-row" data-idx="${variantIdx}" onclick="selectVariant(this)">
                      <div class="variant-radio"><div class="variant-radio-inner"></div></div>
                      <div class="variant-info">
                        <div class="variant-name">${tier}</div>
                        <div class="variant-game-label">${game.name}</div>
                      </div>
                      <div class="variant-price ${isContact ? 'contact' : ''}">${price}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <!-- RIGHT: sticky purchase card -->
        <div class="purchase-card">
          <div class="purchase-card-banner">
            <div class="purchase-card-banner-bg"></div>
            <div class="purchase-card-banner-stripes"></div>
            <div class="purchase-card-banner-dots"></div>
            <div class="purchase-card-banner-glow"></div>
            <div class="purchase-card-avatar">${purchaseAvatarInner}</div>
          </div>
          <div class="purchase-card-body">
            <div class="purchase-title">Purchase</div>
            <div class="purchase-selected" id="selectedLabel">Select a variant on the left to continue.</div>
            <div class="purchase-price-row">
              <div class="purchase-price empty" id="selectedPrice">—</div>
            </div>
            <a href="https://discord.gg/WyMDtxhFyD" class="purchase-btn" id="purchaseBtn" style="pointer-events:none;opacity:0.4">
              <img src="assets/extras/discord.png" alt="" class="purchase-btn-icon" onerror="this.style.display='none'" />
              Purchase on Discord
            </a>
            <div class="purchase-note">All purchases are handled via our Discord ticket system. Join and open a ticket after clicking.</div>
            <div class="purchase-divider"></div>
            <div class="purchase-features">
              <div class="purchase-feature">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Fast delivery via ticket
              </div>
              <div class="purchase-feature">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Regular config updates
              </div>
              <div class="purchase-feature">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Dedicated 24/7 support
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    ${renderFooter()}
  `;

  // Apply CSS vars
  document.querySelectorAll('.product-hero, .purchase-card').forEach(el => {
    el.style.setProperty('--hero-gradient', product.gradient);
    el.style.setProperty('--accent', product.accentColor);
  });

  // Accent dot in hero meta
  document.querySelectorAll('.hero-meta-pill .dot').forEach((dot, i) => {
    if (i === 0) dot.style.background = product.accentColor;
  });

  // Purchase card glow + btn
  const glow = document.querySelector('.purchase-card-banner-glow');
  if (glow) glow.style.background = product.accentColor;

  document.querySelector('.purchase-btn').style.background = product.accentColor;
  document.querySelector('.purchase-btn').style.color = btnTextColor;

  // Invert discord icon when button is light-colored
  const btnIcon = document.querySelector('.purchase-btn-icon');
  if (btnIcon) {
    btnIcon.style.filter = btnTextColor === '#000' ? 'invert(1)' : 'none';
  }

  // Feature check icons
  document.querySelectorAll('.purchase-feature svg').forEach(svg => {
    svg.style.color = product.accentColor;
  });

  window._variants = allVariants;
  window._accent = product.accentColor;
  window._btnTextColor = btnTextColor;
}

// ── GAME ACCORDION ───────────────────────────────────────
function toggleGame(head) {
  const isOpen = head.classList.contains('open');
  const variants = head.nextElementSibling;
  if (isOpen) {
    head.classList.remove('open');
    variants.classList.remove('open');
  } else {
    head.classList.add('open');
    variants.classList.add('open');
  }
}

// ── VARIANT SELECTION ────────────────────────────────────
function selectVariant(row) {
  document.querySelectorAll('.variant-row').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');

  const idx = parseInt(row.dataset.idx);
  const v = window._variants[idx];

  const labelEl = document.getElementById('selectedLabel');
  const priceEl = document.getElementById('selectedPrice');
  const btnEl   = document.getElementById('purchaseBtn');

  const isContact = isNaN(parseFloat(String(v.price).replace('$','')));

  labelEl.innerHTML = `<em>${v.game}</em> · ${v.tier}`;

  if (isContact) {
    priceEl.textContent = 'Contact Staff';
    priceEl.classList.add('empty');
    priceEl.style.fontSize = '16px';
  } else {
    priceEl.textContent = v.price;
    priceEl.classList.remove('empty');
    priceEl.style.fontSize = '32px';
  }

  btnEl.style.pointerEvents = 'auto';
  btnEl.style.opacity = '1';
}

// ── FOOTER HELPER ────────────────────────────────────────
function renderFooter() {
  return `
    <footer>
      <a href="index.html" class="foot-logo">
        <img src="assets/logo.png" alt="Bugware" onerror="this.style.display='none'" />
        <span>Bugware</span>
      </a>
      <span class="foot-copy">© 2025 Bugware. All rights reserved.</span>
      <ul class="foot-links">
        <li><a href="index.html#features">Features</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="reviews.html">Vouches</a></li>
        <li><a href="index.html#discord">Discord</a></li>
      </ul>
    </footer>
  `;
}
</script>

</body>
</html>
